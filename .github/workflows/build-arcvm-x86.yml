name: VM x86_64 Kernel with KSU (v3.2.5 配套)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04
    steps:
      - name: 安装编译依赖
        run: |
          apt update && apt install -y --no-install-recommends \
            bc bison build-essential flex git libssl-dev libelf-dev \
            wget rsync python3 device-tree-compiler repo clang lld curl \
            ca-certificates

      - name: 拉取ARCVM 5.10内核源码
        run: |
          mkdir -p ~/arcvm-kernel && cd ~/arcvm-kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10-arcvm-gki-base --depth=1
          repo sync -j4

      - name: 打入KernelSU补丁（锁main分支 + 修复x86老内核兼容性）
        run: |
          cd ~/arcvm-kernel
          # 1. 拉取最新main分支代码
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          
          # 2. 【双重修复】同时修补 common.c 和 hid-input.c
          # 这两个文件都用到了老内核没有的 X86_FEATURE_INDIRECT_SAFE 宏
          sed -i 's/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];\n#define X86_FEATURE_INDIRECT_SAFE (1*32+21)/' arch/x86/include/asm/cpu_device_id.h
          sed -i 's/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];\n#define X86_FEATURE_INDIRECT_SAFE (1*32+21)/' arch/x86/kernel/cpu/common.c
          sed -i 's/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];/extern const struct cpu_dev \*const __cpu_dev_array\[NR_CPUS\];\n#define X86_FEATURE_INDIRECT_SAFE (1*32+21)/' drivers/hid/hid-input.c

      - name: 修正ARCVM专属编译配置
        run: |
          cd ~/arcvm-kernel
          sed -i "s/check_defconfig//" common/build.config.gki
          sed -i "s/DEFCONFIG=gki_defconfig/DEFCONFIG=x86_64_arcvm_defconfig/" common/build.config.gki
          cp common/arch/x86/configs/x86_64_arcvm_defconfig common/arch/x86/configs/x86_64_defconfig

      - name: 启动内核编译
        run: |
          cd ~/arcvm-kernel
          LTO=thin \
          CFLAGS='-Wno-error -Wno-unused-function' \
          CXXFLAGS='-Wno-error -Wno-unused-function' \
          BUILD_CONFIG=common/build.config.gki.x86_64 \
          build/build.sh

      - name: 上传bzImage
        uses: actions/upload-artifact@v4
        with:
          name: arcvm-x86_64-bzImage
          path: ~/arcvm-kernel/out/android12-5.10/dist/bzImage
          retention-days: 90
