name: Build ARCVM x86_64 Kernel with KSU
# 允许手动触发编译，也可推送代码时自动触发
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    # 使用GitHub官方最新Runner，避免旧版本被弃用的问题
    runs-on: ubuntu-latest
    # 关键修复：指定纯净的Ubuntu 22.04容器，规避新版Runner工具链兼容性问题
    container: ubuntu:22.04
    steps:
      - name: 安装编译依赖工具
        run: |
          apt update && apt install -y --no-install-recommends \
            bc bison build-essential flex git libssl-dev libelf-dev \
            wget rsync python3 device-tree-compiler repo clang lld curl \
            ca-certificates
          # 容器内默认无ca证书会导致repo sync报错，手动安装兜底

      - name: 拉取ARCVM专属内核源码（安卓12/5.10/x86_64 GKI基线）
        run: |
          mkdir -p ~/arcvm-kernel && cd ~/arcvm-kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10-arcvm-gki-base --depth=1
          # 降低并发数避免网络波动断连，断连后可重新运行自动续传
          repo sync -j4

      - name: 打入KernelSU补丁（默认最新稳定版，完美兼容5.10 GKI内核）
        run: |
          cd ~/arcvm-kernel
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -

      - name: 修正ARCVM专属编译配置（必做，否则VM内virtio/驱动缺失）
        run: |
          cd ~/arcvm-kernel
          sed -i "s/check_defconfig//" common/build.config.gki
          sed -i "s/DEFCONFIG=gki_defconfig/DEFCONFIG=x86_64_arcvm_defconfig/" common/build.config.gki
          cp common/arch/x86/configs/x86_64_arcvm_defconfig common/arch/x86/configs/x86_64_defconfig

      - name: 启动内核编译（LTO=thin降低内存占用，规避无用函数报错）
        run: |
          cd ~/arcvm-kernel
          LTO=thin \
          CFLAGS='-Wno-error -Wno-unused-function' \
          CXXFLAGS='-Wno-error -Wno-unused-function' \
          BUILD_CONFIG=common/build.config.gki.x86_64 \
          build/build.sh

      - name: 上传编译完成的bzImage内核文件
        uses: actions/upload-artifact@v4
        with:
          name: arcvm-x86_64-bzImage
          path: ~/arcvm-kernel/out/android12-5.10/dist/bzImage
          retention-days: 90  # 产物保留90天，足够下载使用
