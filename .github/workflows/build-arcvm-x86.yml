name: Build ARCVM x86_64 Kernel + KSU v3.2.5

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ubuntu:22.04

    steps:
      - name: 安装依赖（无 sudo，容器内已是 root）
        run: |
          apt-get update -qq
          apt-get install -y -qq \
            bc bison build-essential flex git libssl-dev libelf-dev \
            clang lld llvm curl wget python3 python3-pip \
            device-tree-compiler rsync cpio unzip repo \
            ca-certificates

      - name: 拉取 ARCVM 5.10 内核源码（AOSP common）
        run: |
          mkdir -p ~/arcvm-kernel && cd ~/arcvm-kernel
          # 用 repo 拉，比纯 git clone 更容易对齐 ARCVM defconfig
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10-arcvm-gki-base --depth=1
          repo sync -c -j4 || repo sync -c -j2
          echo "✅ 源码就绪"

      - name: 打入 KernelSU v3.2.5（云端版修复全量）
        run: |
          cd ~/arcvm-kernel

          # 1. 拉 KSU v3.2.5（用 release 包最稳）
          curl -LO https://github.com/tiann/KernelSU/releases/download/v3.2.5/kernel-su-5.10.zip
          unzip -o kernel-su-5.10.zip
          rm kernel-su-5.10.zip

          # 2. 拷贝进内核
          mkdir -p common/drivers/kernelsu
          cp -r drivers/kernelsu/* common/drivers/kernelsu/

          # 3. Makefile 入口
          if ! grep -q kernelsu common/drivers/Makefile; then
            sed -i '/obj-y += char\//a obj-y += kernelsu/' common/drivers/Makefile
          fi

          # 4. 5.10 兼容修复（云端必炸项，全部收敛）
          mkdir -p common/arch/x86/include/asm
          # 修复 X86_FEATURE_INDIRECT_SAFE
          if ! grep -q INDIRECT_SAFE common/arch/x86/include/asm/cpu_device_id.h; then
            echo -e "\n#define X86_FEATURE_INDIRECT_SAFE (1*32+21)" \
              >> common/arch/x86/include/asm/cpu_device_id.h
          fi
          sed -i '1i#define X86_FEATURE_INDIRECT_SAFE (1*32+21)' \
            common/drivers/kernelsu/core/init.c

          # 修复 __NR_syscalls
          sed -i '1i\nextern const int __NR_syscalls;\n' \
            common/drivers/kernelsu/hook/x86_64/syscall_hook.c

          # 修复 READ_ONCE → void 报错
          sed -i 's|ksu_syscall_hook_fn = READ_ONCE(syscall_hooks\[orig_nr\]);|void *hook_ptr = (void *)syscall_hooks[orig_nr]; ksu_syscall_hook_fn = (long (*)(int, const struct pt_regs *))hook_ptr;|' \
            common/drivers/kernelsu/hook/x86_64/syscall_hook.c
          sed -i 's|return READ_ONCE(syscall_hooks\[nr\]) != NULL;|void *hook_ptr = (void *)syscall_hooks[nr]; return (hook_ptr != NULL);|' \
            common/drivers/kernelsu/hook/x86_64/syscall_hook.c

          echo "✅ KSU v3.2.5 打入完成"

      - name: 配置内核（ARCVM + KSU）
        run: |
          cd ~/arcvm-kernel
          # ARCVM 专用 defconfig，不存在就兜底 gki
          if [ -f common/arch/x86/configs/x86_64_arcvm_defconfig ]; then
            export DEFCONFIG=x86_64_arcvm_defconfig
          else
            export DEFCONFIG=gki_defconfig
          fi
          cd common && make ARCH=x86_64 $DEFCONFIG

          ./scripts/config --file .config --enable CONFIG_KSU
          # ARCVM virtio 必要驱动
          for o in VIRTIO_BLK VIRTIO_NET VIRTIO_FS VIRTIO_CONSOLE VIRTIO_INPUT \
                   9P_FS NET_9P NET_9P_VIRTIO; do
            ./scripts/config --file .config --enable CONFIG_$o
          done
          # 关调试防 OOM
          for o in DEBUG_INFO KASAN UBSAN KCSAN DEBUG_LIST DEBUG_SPINLOCK; do
            ./scripts/config --file .config --disable CONFIG_$o
          done
          make ARCH=x86_64 olddefconfig
          grep CONFIG_KSU .config
          echo "✅ 配置完成"

      - name: 编译（-j 不拉满，云端 runner 内存有限）
        run: |
          cd ~/arcvm-kernel/common
          # 云端 runner 一般 7GB 内存，不建 swap 也 ok，-j4 稳
          make ARCH=x86_64 LLVM=1 LLVM_IAS=1 \
            CFLAGS='-Wno-error -Wno-unused-function -Wno-maybe-uninitialized' \
            CXXFLAGS='-Wno-error -Wno-unused-function' \
            KCFLAGS=-Wno-error \
            LTO=thin \
            -j4

      - name: 上传 bzImage
        uses: actions/upload-artifact@v4
        with:
          name: arcvm-x86_64-ksu-v3.2.5
          path: ~/arcvm-kernel/common/arch/x86/boot/bzImage
          retention-days: 90
