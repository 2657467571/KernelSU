name: Build ARCVM x86_64 Kernel with KSU (v3.2.5 最终稳定版)
# 支持手动触发编译，推送代码到main分支时自动触发
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    # 使用GitHub官方最新Runner，避免旧版本被弃用问题
    runs-on: ubuntu-latest
    # 锁定Ubuntu 22.04容器，彻底规避新版Runner工具链兼容性问题
    container: ubuntu:22.04
    steps:
      - name: 安装编译依赖工具（无sudo版）
        run: |
          apt-get update && apt-get install -y --no-install-recommends \
            bc bison build-essential flex git libssl-dev libelf-dev \
            wget rsync python3 device-tree-compiler clang lld curl \
            ca-certificates gnupg2
          # 手动安装repo工具（适配容器环境）
          curl -LSs https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod +x /usr/local/bin/repo

      - name: 拉取ARCVM专属内核源码（安卓12/5.10/x86_64 GKI基线）
        run: |
          mkdir -p ~/arcvm-kernel && cd ~/arcvm-kernel
          # 初始化ARCVM 5.10专用源码分支（深度克隆减少下载量）
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b common-android12-5.10-arcvm-gki-base --depth=1
          # 4线程同步源码，平衡速度与稳定性
          repo sync -j4

      - name: 打入KernelSU补丁（锁定v3.2.5版本+全量兼容性修复）
        run: |
          cd ~/arcvm-kernel
          # 1. 拉取KernelSU源码并锁定v3.2.5 tag（完美匹配Manager v3.2.5）
          git clone --depth=1 https://github.com/tiann/KernelSU.git
          cd KernelSU && git checkout v3.2.5 && cd ..
          
          # 2. 手动拷贝KSU源码到内核驱动目录（避免setup.sh路径错误）
          mkdir -p common/drivers/kernelsu
          cp -r KernelSU/kernel/* common/drivers/kernelsu/
          
          # 3. 修改内核Makefile，添加KSU编译入口
          sed -i '/obj-y += char\//a obj-y += kernelsu/' common/drivers/Makefile
          
          # 4. 【修复1】补全5.10内核缺失的安全特性宏（全局兜底）
          mkdir -p arch/x86/include/asm/
          echo -e "\n/* KernelSU Fix for Linux 5.10 */\n#define X86_FEATURE_INDIRECT_SAFE (1*32+21)" >> arch/x86/include/asm/cpu_device_id.h
          
          # 5. 【修复2】硬编码init.c宏定义（无视LTO优化）
          sed -i '1i#define X86_FEATURE_INDIRECT_SAFE (1*32+21)' common/drivers/kernelsu/core/init.c
          
          # 6. 【修复3】声明缺失的系统调用常量（解决__NR_syscalls报错）
          sed -i '1i\nextern const int __NR_syscalls;\n' common/drivers/kernelsu/hook/x86_64/syscall_hook.c
          
          # 7. 【修复4】解决READ_ONCE宏导致的void类型语法错误（精准匹配v3.2.5代码行号）
          sed -i '163s|ksu_syscall_hook_fn = READ_ONCE(syscall_hooks[orig_nr]);|void *hook_ptr = (void *)syscall_hooks[orig_nr]; ksu_syscall_hook_fn = (long (*)(int, const struct pt_regs *))hook_ptr;|' common/drivers/kernelsu/hook/x86_64/syscall_hook.c
          sed -i '200s|return READ_ONCE(syscall_hooks[nr]) != NULL;|void *hook_ptr = (void *)syscall_hooks[nr]; return (hook_ptr != NULL);|' common/drivers/kernelsu/hook/x86_64/syscall_hook.c

      - name: 修正ARCVM编译配置（开启KSU+适配VM环境）
        run: |
          cd ~/arcvm-kernel
          # 1. 修改构建配置，禁用defconfig校验，切换为ARCVM专用配置
          sed -i "s/check_defconfig//" common/build.config.gki
          sed -i "s/DEFCONFIG=gki_defconfig/DEFCONFIG=x86_64_arcvm_defconfig/" common/build.config.gki
          
          # 2. 拷贝ARCVM专用配置文件，若不存在则 fallback 到GKI配置
          if [ -f "common/arch/x86/configs/x86_64_arcvm_defconfig" ]; then
            cp common/arch/x86/configs/x86_64_arcvm_defconfig common/arch/x86/configs/x86_64_defconfig
          else
            echo "警告：ARCVM配置文件不存在，使用GKI配置兜底"
            sed -i "s/DEFCONFIG=x86_64_arcvm_defconfig/DEFCONFIG=gki_defconfig/" common/build.config.gki
          fi
          
          # 3. 强制开启KernelSU支持（确保编译出KSU功能）
          echo "CONFIG_KSU=y" >> common/arch/x86/configs/x86_64_defconfig
          # 验证KSU配置是否生效
          grep CONFIG_KSU common/arch/x86/configs/x86_64_defconfig

      - name: 启动内核编译（无sudo Swap配置+内存兜底）
        run: |
          cd ~/arcvm-kernel
          
          # 【关键修复】完全无sudo创建4G Swap空间（适配容器root环境）
          swapoff -a || true  # 关闭旧Swap避免冲突
          rm -f /swapfile     # 清理残留文件
          dd if=/dev/zero of=/swapfile bs=1M count=4096 status=none  # 创建4G Swap
          chmod 0600 /swapfile
          mkswap /swapfile
          swapon /swapfile
          # 验证Swap生效
          echo "--- 内存/Swap状态验证 ---"
          free -h
          echo "-------------------------"
          
          # 启动编译（LTO=thin降低内存占用，忽略无关函数报错）
          LTO=thin \
          CFLAGS='-Wno-error -Wno-unused-function' \
          CXXFLAGS='-Wno-error -Wno-unused-function' \
          BUILD_CONFIG=common/build.config.gki.x86_64 \
          TARGET_ARCH=x86_64 \
          KCFLAGS=-Wno-error \
          build/build.sh

      - name: 上传编译完成的bzImage内核文件
        uses: actions/upload-artifact@v4
        with:
          name: arcvm-x86_64-bzImage-v3.2.5
          path: ~/arcvm-kernel/out/android12-5.10/dist/bzImage
          retention-days: 90  # 产物保留90天，足够下载使用
