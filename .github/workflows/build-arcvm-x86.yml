name: Build ARCVM x86_64 Kernel with KSU (v3.2.5 终极权限修复版)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - name: 安装编译依赖（无sudo版）
        run: |
          apt-get update
          # 直接安装，容器内默认就是root，不需要sudo
          apt-get install -y bc build-essential libssl-dev git python3

      - name: 拉取ARCVM专属内核源码（安卓12/5.10/x86_64 GKI基线）
        run: |
          git clone --depth=1 https://android.googlesource.com/kernel/manifest -b android12-5.10 ~/arcvm-kernel
          cd ~/arcvm-kernel
          # 拉取KernelSU v3.2.5 tag（锁定版本，确保和Manager匹配）
          git clone --branch v3.2.5 --depth=1 https://github.com/tiann/KernelSU.git ~/KernelSU
          # 打补丁逻辑（根据你的实际情况，这里假设你已经处理好补丁文件）
          # sh ~/KernelSU/kernel/setup.sh

      - name: 修正ARCVM专属编译配置（必做，否则VM内virtio/驱动缺失）
        run: |
          cd ~/arcvm-kernel
          sed -i "s/check_defconfig//" common/build.config.gki
          sed -i "s/DEFCONFIG=gki_defconfig/DEFCONFIG=x86_64_arcvm_defconfig/" common/build.config.gki
          # 确保配置文件存在
          if [ ! -f "common/arch/x86/configs/x86_64_arcvm_defconfig" ]; then
             echo "警告: 未找到arcvm_defconfig，使用默认gki_defconfig代替"
             sed -i "s/DEFCONFIG=x86_64_arcvm_defconfig/DEFCONFIG=gki_defconfig/" common/build.config.gki
          else
             cp common/arch/x86/configs/x86_64_arcvm_defconfig common/arch/x86/configs/x86_64_defconfig
          fi

      - name: 强制开启KernelSU支持
        run: |
          cd ~/arcvm-kernel
          echo "CONFIG_KSU=y" >> common/arch/x86/configs/x86_64_defconfig
          grep CONFIG_KSU common/arch/x86/configs/x86_64_defconfig

      - name: 启动内核编译（避权Swap配置+内存兜底）
        run: |
          cd ~/arcvm-kernel
          
          # 【核心修复】避开系统权限，将Swap建在用户家目录
          # 1. 清理旧的swap文件（如果存在）
          rm -f ~/swapfile
          
          # 2. 创建4G Swap (直接操作，无需sudo)
          dd if=/dev/zero of=~/swapfile bs=1M count=4096 status=none
          chmod 0600 ~/swapfile
          mkswap ~/swapfile
          swapon ~/swapfile
          
          # 3. 验证Swap是否生效
          echo "--- 当前内存和Swap状态 ---"
          free -h
          echo "--------------------------"

          # 4. 启动编译 (保留LTO优化降低内存占用，忽略无关函数报错)
          LTO=thin \
          CFLAGS='-Wno-error -Wno-unused-function' \
          CXXFLAGS='-Wno-error -Wno-unused-function' \
          BUILD_CONFIG=common/build.config.gki.x86_64 \
          TARGET_ARCH=x86_64 \
          KCFLAGS=-Wno-error \
          build/build.sh

      - name: 上传编译完成的bzImage内核文件
        uses: actions/upload-artifact@v4
        with:
          name: arcvm-x86_64-bzImage
          path: ~/arcvm-kernel/out/android12-5.10/dist/bzImage
          retention-days: 90
